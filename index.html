```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Hub</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
margin:0;
display:flex;
}

.sidebar{
width:250px;
background:#0f172a;
padding:20px;
height:100vh;
}

.profile-card{
background:#1e293b;
padding:20px;
border-radius:20px;
text-align:center;
cursor:pointer;
}

.avatar{
width:80px;
height:80px;
background:#2563eb;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-size:35px;
overflow:hidden;
}

.main{
flex:1;
padding:30px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

input,textarea,select{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}

button{
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
cursor:pointer;
background:#2563eb;
color:white;
}

.posts{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.post{
background:#111827;
padding:20px;
border-radius:20px;
}

.actions{
margin-top:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

#authScreen{
position:fixed;
inset:0;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.auth-box{
background:#0f172a;
padding:30px;
border-radius:20px;
width:350px;
}

</style>
</head>

<body>

<div id="authScreen">

<div class="auth-box">

<h1>Knowledge Hub 🚀</h1>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login / Register</button>

</div>

</div>

<div class="sidebar">

<div class="profile-card" onclick="openProfile()">

<div class="avatar" id="avatarPreview">👤</div>

<h2 id="profileName">Guest</h2>

<p>Writer & Learner</p>

</div>

</div>

<div class="main">

<div class="card">

<h2>Create Post</h2>

<input type="text" id="title" placeholder="Title">

<textarea id="content" placeholder="Write something"></textarea>

<select id="category">

<option>Essay</option>
<option>Lesson</option>
<option>Story</option>

</select>

<button onclick="createPost()">Publish</button>

</div>

<div class="posts" id="postsContainer"></div>

</div>

<div id="profileModal"
style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
">

<div style="
background:#0f172a;
padding:30px;
border-radius:20px;
width:350px;
">

<h2>Edit Profile</h2>

<input type="text" id="newUsername" placeholder="New Username">

<input type="file" id="newAvatar">

<button onclick="saveProfile()">Save</button>

<button onclick="closeProfile()" style="background:crimson;">
Close
</button>

</div>

</div>

<script>

window.login = function(){

const email =
document.getElementById("email").value;

if(!email){
alert("Enter email");
return;
}

const username =
email.split("@")[0];

localStorage.setItem(
"loggedInUser",
username
);

document.getElementById(
"profileName"
).innerText = username;

document.getElementById(
"authScreen"
).style.display = "none";

};

window.createPost = function(){

const title =
document.getElementById("title").value;

const content =
document.getElementById("content").value;

const category =
document.getElementById("category").value;

const container =
document.getElementById("postsContainer");

const post =
document.createElement("div");

post.classList.add("post");

post.innerHTML = `

<h3>${title}</h3>

<p>${content}</p>

<small>${category}</small>

<div class="actions">

<button onclick="alert('Liked ❤️')">
Like
</button>

<button onclick="this.parentElement.parentElement.remove()">
Delete
</button>

<button onclick="commentPost(this)">
Comment
</button>

</div>

<div class="comments"></div>

`;

container.prepend(post);

};

window.commentPost = function(button){

const text =
prompt("Write comment");

if(!text) return;

const div =
document.createElement("div");

div.innerText = text;

button.parentElement.nextElementSibling.appendChild(div);

};

window.openProfile = function(){

document.getElementById(
"profileModal"
).style.display = "flex";

};

window.closeProfile = function(){

document.getElementById(
"profileModal"
).style.display = "none";

};

window.saveProfile = function(){

const username =
document.getElementById(
"newUsername"
).value;

const avatar =
document.getElementById(
"newAvatar"
).files[0];

if(username){

localStorage.setItem(
"loggedInUser",
username
);

document.getElementById(
"profileName"
).innerText = username;

}

if(avatar){

const url =
URL.createObjectURL(avatar);

document.getElementById(
"avatarPreview"
).innerHTML =
`<img src="${url}" style="width:100%;height:100%;object-fit:cover;">`;

}

closeProfile();

};

</script>

</body>
</html>
```
